name: Update LIC NAV Data

on:
  schedule:
    # Runs at 18:30 UTC every day (which is midnight IST, meaning it fetches previous day's end NAV)
    - cron: '30 18 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  update-nav:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Allows action to commit and push changes

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 requests

      - name: Fetch and Parse NAV
        run: python fetch_nav.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add nav_data.json
          git commit -m "Automated update of NAV data [skip ci]" || echo "No changes to commit"
          git push
